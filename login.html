<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录</title>
  <style>
    :root {
      --bg: #f3f7ff;
      --text: #0f172a;
      --line: #cfe0ff;
      --muted: #64748b;
      --accent: #2563eb;
      --accent-strong: #1d4ed8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
      font-family: "Source Han Sans SC", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 0% 0%, #dbeafe 0%, transparent 45%),
        radial-gradient(circle at 100% 0%, #e0f2fe 0%, transparent 42%),
        var(--bg);
    }

    .card {
      width: min(92vw, 380px);
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 16px 34px rgba(15, 23, 42, 0.16);
      padding: 18px 16px 16px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      color: #1e3a8a;
      text-align: center;
      letter-spacing: 0.5px;
    }

    .subtitle {
      margin: 8px 0 14px;
      font-size: 13px;
      color: var(--muted);
      text-align: center;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      font-weight: 600;
    }

    input[type="password"] {
      display: block;
      width: min(100%, 320px);
      height: 50px;
      margin: 0 auto;
      border: 2px solid #93c5fd;
      border-radius: 12px;
      padding: 0 14px;
      font-size: 20px;
      font-weight: 700;
      text-align: center;
      color: var(--text);
      background: #fff;
    }

    input[type="password"]:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 5px rgba(59, 130, 246, 0.2);
    }

    button {
      width: min(100%, 320px);
      display: block;
      margin: 12px auto 0;
      height: 44px;
      border: 1px solid var(--accent-strong);
      border-radius: 10px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 9px 18px rgba(37, 99, 235, 0.25);
    }

    button:hover {
      filter: brightness(1.02);
    }

    .error {
      min-height: 18px;
      margin-top: 8px;
      text-align: center;
      font-size: 12px;
      color: #b91c1c;
    }
  </style>
</head>
<body>
  <form class="card" action="/.netlify/functions/login" method="post">
    <h1>访问验证</h1>
    <div class="subtitle">请输入密码后继续</div>
    <label for="password">密码</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required>
    <input id="nextInput" type="hidden" name="next" value="/">
    <button type="submit">进入页面</button>
    <div id="errorMsg" class="error"></div>
  </form>

  <script>
    const params = new URLSearchParams(window.location.search);
    const next = params.get("next");
    const safeNext = next && next.startsWith("/") && !next.startsWith("//") ? next : "/";
    document.getElementById("nextInput").value = safeNext;

    if (params.get("error") === "1") {
      document.getElementById("errorMsg").textContent = "密码错误，请重试。";
    }

    document.getElementById("password").focus();
  </script>
</body>
</html>
